services:
  bridge:
    build: .
    working_dir: /workspace
    environment:
      DEVICELAB_PROJECT_ROOT: /workspace
    command: >
      bash -lc "cmake -S . -B build &&
      cmake --build build &&
      python3 -m uvicorn tools.bridge.server:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - .:/workspace

  dashboard:
    image: node:20-bookworm
    working_dir: /workspace/dashboard
    command: bash -lc "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_BRIDGE_URL: http://localhost:8000
    depends_on:
      bridge:
        condition: service_healthy
    volumes:
      - .:/workspace
